<SCRIPT LANGUAGE="JavaScript">


	document.all.music.volume = -3000;
	document.all.toggle_music.innerText = "pause music";

	function toggleMusic() {
		if (document.all.toggle_music.innerText == "pause music") {
			document.all.music.volume = -10000;
			document.all.toggle_music.innerText = "play music";
		} else if (document.all.toggle_music.innerText == "play music") {
			document.all.music.volume = -3000;
			document.all.toggle_music.innerText = "pause music";
		}
	}
</SCRIPT>
